        // 計算距離公式
        function getDistance(lat1, lon1, lat2, lon2) {
            var R = 6371; 
            var dLat = (lat2 - lat1) * Math.PI / 180;
            var dLon = (lon2 - lon1) * Math.PI / 180;
            var a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                    Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                    Math.sin(dLon/2) * Math.sin(dLon/2);
            var c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c;

            document.getElementById('list-title-text').textContent = `📍 ${district} 的吸菸區 (共 ${filtered.length} 個點)`;
            
            let listHtml = '';
            if (filtered.length === 0) {
                listHtml = '<p style="text-align:center; color:#999;">該區查無資料。</p>';
            } else {
                map.setView([parseFloat(filtered[0].緯度), parseFloat(filtered[0].經度)], 14);
                filtered.forEach(area => {
                    if(!isNaN(area.緯度) && !isNaN(area.經度)) {
                        L.marker([area.緯度, area.經度]).addTo(markerGroup)
                            .bindPopup(createPopupContent(area));
                    }
                    
                    listHtml += `
                        <div class="area-card">
                            <div class="card-header">
                                <h4 class="card-title">${area.地點}</h4>
                            </div>
                            <div class="card-detail">📍 <b>地址：</b>${area.地址} (${area.行政區})</div>
                            ${area.相對位置 ? `<div class="card-detail" style="color: #d35400; font-weight: bold;">🗺️ <b>相對位置：</b>${area.相對位置}</div>` : ''}
                            <div class="card-detail">🕒 <b>開放時間：</b>${area.開放時間 || '未註明'}</div>
                            <span class="badge">${area.樣態}</span>
                        </div>
                    `;
                });
            }
            document.getElementById('area-list').innerHTML = listHtml;
        }

        // GPS 定位功能
        function findLocation() {
            const statusDiv = document.getElementById('status');
            statusDiv.innerHTML = "🧭 正在定位中...";
            if (!navigator.geolocation) { statusDiv.innerHTML = "❌ 不支援定位"; return; }

            navigator.geolocation.getCurrentPosition(
                function success(position) {
                    const userLat = position.coords.latitude;
                    const userLon = position.coords.longitude;
                    statusDiv.innerHTML = "<span style='color: green;'>✅ 定位成功！已列出周圍 3 公里內的吸菸區。</span>";
                    
                    map.setView([userLat, userLon], 15);
                    markerGroup.clearLayers(); 
                    L.marker([userLat, userLon]).addTo(markerGroup).bindPopup('<b>📍 您的目前位置</b>').openPopup();

                    let nearbyAreas = [];
                    smokingAreasData.forEach(area => {
                        if (!isNaN(area.緯度) && !isNaN(area.經度)) {
                            let dist = getDistance(userLat, userLon, area.緯度, area.經度);
                            if (dist <= 3.0) { nearbyAreas.push({ ...area, distance: dist }); }
                        }
                    });

                    nearbyAreas.sort((a, b) => a.distance - b.distance);
                    document.getElementById('list-title-text').textContent = `🧭 附近的吸菸區 (共 ${nearbyAreas.length} 個點)`;

                    let listHtml = '';
                    if (nearbyAreas.length === 0) {
                        listHtml = '<p style="text-align:center; color:#999; padding: 20px;">附近沒有吸菸區。</p>';
                    } else {
                        nearbyAreas.forEach(area => {
                            let distStr = area.distance < 1 ? `${(area.distance * 1000).toFixed(0)} 公尺` : `${area.distance.toFixed(2)} 公里`;
                            
                            // 地圖標記同步加入距離與細節
                            L.marker([area.緯度, area.經度]).addTo(markerGroup)
                                .bindPopup(createPopupContent(area, `<span style="font-size:11px; background:#fdf2e9; color:#e67e22; padding:2px 6px; border-radius:10px; margin-left:5px;">離你 ${distStr}</span>`));
                            
                            listHtml += `
                                <div class="area-card">
                                    <div class="card-header">
                                        <h4 class="card-title">${area.地點}</h4>
                                        <span class="card-distance">離你 ${distStr}</span>
                                    </div>
                                    <div class="card-detail">📍 <b>地址：</b>${area.地址} (${area.行政區})</div>
                                    ${area.相對位置 ? `<div class="card-detail" style="color: #d35400; font-weight: bold;">🗺️ <b>相對位置：</b>${area.相對位置}</div>` : ''}
                                    <div class="card-detail">🕒 <b>開放時間：</b>${area.開放時間 || '未註明'}</div>
                                    <span class="badge">${area.樣態}</span>
                                </div>
                            `;
                        });
                    }
                    document.getElementById('area-list').innerHTML = listHtml;
                },
                function error() { statusDiv.innerHTML = "⚠️ 無法取得定位權限，請直接手選行政區。"; }
            );
        }
    </script>
